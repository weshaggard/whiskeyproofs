# Weekly workflow to research new bourbon and rye releases and update the whiskey index
name: Find New Bourbon and Rye Releases

on:
  # Run weekly on Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  research-and-update:
    runs-on: ubuntu-latest
    environment: automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Run release research agent
        # COPILOT_GITHUB_TOKEN must be a fine-grained PAT stored in the 'automation' environment with:
        #   - User permission:        Copilot Requests (Read)
        #   - Repository permissions: Contents (Read/Write), Pull Requests (Read/Write), Metadata (Read)
        # See: https://docs.github.com/en/copilot/how-tos/copilot-cli/automate-with-actions
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}  # Authenticates with the Copilot AI service
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}              # Used by gh CLI for GitHub API calls (e.g. creating PRs)
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}          # Used by GitHub MCP server for repository operations
          GITHUB_REPOSITORY: ${{ github.repository }}
          CI: true
          NO_COLOR: 1
          TERM: dumb
        run: |
          EXIT_CODE=0
          # 30-minute timeout: research involves fetching multiple distillery sites, calling the
          # Copilot API multiple times, editing files, and creating a PR — all of which add up.
          timeout --foreground --signal=TERM --kill-after=30s 1800s \
            copilot --prompt "$(cat .github/agents/find-new-releases.md)" \
              --allow-all \
              --autopilot \
              --no-ask-user \
              < /dev/null || EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Warning: Copilot agent exited with code $EXIT_CODE"
            echo "Check the step logs above for details. A non-zero exit may indicate the agent"
            echo "timed out, hit an API error, or could not find any new releases to add."
            echo "See: https://docs.github.com/en/copilot/how-tos/copilot-cli/automate-with-actions"
          fi
