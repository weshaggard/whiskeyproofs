# Weekly workflow to research new bourbon and rye releases and update the whiskey index
name: Find New Bourbon and Rye Releases

on:
  # Run weekly on Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research-and-update:
    runs-on: ubuntu-latest
    environment: automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Research new releases
        id: research
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/research_new_releases.py \
            --output research_results.json \
            --verbose

          # Parse all values in a single Python call to avoid repeated JSON reads
          python3 << 'PYEOF' >> $GITHUB_OUTPUT
          import json
          d = json.load(open('research_results.json'))
          print(f"has_changes={'true' if d['has_changes'] else 'false'}")
          print(f"change_count={d['change_count']}")
          # Use heredoc for summary to handle special characters safely
          print(f"summary<<EOF\n{d['summary']}\nEOF")
          PYEOF

      - name: Build change list for PR body
        id: changelist
        if: steps.research.outputs.has_changes == 'true'
        run: |
          python3 << 'PYEOF' >> $GITHUB_OUTPUT
          import json
          d = json.load(open('research_results.json'))
          lines = '\n'.join(f'- {c}' for c in d['changes'])
          print(f"changes_md<<EOF\n{lines}\nEOF")
          PYEOF

      - name: Validate CSV
        if: steps.research.outputs.has_changes == 'true'
        run: python3 .github/scripts/validate_whiskey_data.py

      - name: Generate GitHub App Token
        id: generate_token
        if: steps.research.outputs.has_changes == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Create Pull Request
        if: steps.research.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: 'Research: add new bourbon/rye releases'
          branch: automated/new-releases-${{ github.run_id }}
          delete-branch: true
          title: 'New Releases: ${{ steps.research.outputs.change_count }} update(s) found'
          body: |
            ## Automated Weekly Release Research

            This PR was automatically created by the weekly release finder workflow.

            **Changes:** ${{ steps.research.outputs.change_count }}
            **Summary:** ${{ steps.research.outputs.summary }}

            ### Changes

            ${{ steps.changelist.outputs.changes_md }}

            ### Review Checklist

            - [ ] Verify proof, age, and batch values are correct
            - [ ] Check TTB IDs are accurate (or blank if not found)
            - [ ] Verify product URLs are working

            ---
            *Automated by `.github/workflows/find-new-releases.yml`*
          labels: |
            automated
            release-research

      - name: Upload research results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-results-${{ github.run_id }}
          path: research_results.json
          retention-days: 30

      - name: No changes found
        if: steps.research.outputs.has_changes == 'false'
        run: |
          echo "No new bourbon or rye releases found this week."
          echo "Summary: ${{ steps.research.outputs.summary }}"
