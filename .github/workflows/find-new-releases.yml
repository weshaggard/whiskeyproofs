name: Find New Bourbon and Rye Releases

on:
  schedule:
    # Daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  find-new-releases:
    runs-on: ubuntu-latest
    environment: automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run weekly release discovery agent
        env:
          # Fine-grained token for Copilot CLI automation (repo contents + pull requests)
          # Configure in repository/environment secrets as COPILOT_GITHUB_TOKEN
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          test -f .github/prompts/find-new-releases.prompt.md
          copilot -p "$(cat .github/prompts/find-new-releases.prompt.md)" \
            --allow-all-tools --allow-all-urls --autopilot --no-ask-user

      - name: Run data validation script
        run: python3 .github/scripts/validate_whiskey_data.py

      - name: Fix broken URLs
        run: python3 .github/scripts/validate_urls.py --apply

      - name: Fix broken TTB URLs
        run: python3 .github/scripts/validate_ttb_urls.py --apply

      - name: Run URL validation script
        run: python3 .github/scripts/validate_urls.py

      - name: Run TTB URL validation script
        run: python3 .github/scripts/validate_ttb_urls.py

      - name: Generate GitHub App token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: 'Automated weekly bourbon and rye release update'
          branch: automated/find-new-releases
          delete-branch: true
          title: 'Weekly bourbon and rye release updates'
          body: |
            ## Automated Weekly Release Discovery

            This PR was generated by the weekly release discovery agent workflow.

            ### What this workflow does
            - Searches for newly announced bourbon and rye releases
            - Prefers official press releases and official product pages
            - Updates `_data/whiskeyindex.csv` with complete fields, URLs, and TTB labels when verified
            - Extends `ReleaseYear` ranges for unchanged recurring releases instead of adding duplicate rows
            - Runs repository validation scripts before creating this PR

            ---
            *Automated by `.github/workflows/find-new-releases.yml`*
          labels: |
            automated
            release-updates
