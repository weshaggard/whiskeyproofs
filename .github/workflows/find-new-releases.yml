# Weekly workflow to find new bourbon/rye releases and create PRs for adding them to the index
name: Find New Releases

on:
  # Run weekly on Mondays at 09:00 UTC
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      additional_context:
        description: 'Additional context or specific releases to research (optional)'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  find-new-releases:
    runs-on: ubuntu-latest
    environment: automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Create Copilot research issue
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          WEEK=$(date +%Y-%m-%d)
          PROMPT=$(cat .github/prompts/find-new-releases.prompt.md)

          ADDITIONAL=""
          if [ -n "${{ github.event.inputs.additional_context }}" ]; then
            ADDITIONAL="

## Additional Context

${{ github.event.inputs.additional_context }}"
          fi

          gh issue create \
            --title "Weekly Research: Find new bourbon/rye releases - ${WEEK}" \
            --body "@copilot

${PROMPT}${ADDITIONAL}" \
            --label "automated"
