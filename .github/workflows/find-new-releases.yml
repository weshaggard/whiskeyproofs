name: Find New Bourbon and Rye Releases

on:
  push:
    branches: [main]
  schedule:
    # Daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  find-new-releases:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    environment: automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to PR branch if it already exists
        run: |
          if git fetch origin automated/find-new-releases 2>/dev/null; then
            git checkout automated/find-new-releases
            echo "Checked out existing PR branch — new changes will be additive"
          else
            echo "Branch does not exist yet — it will be created from the current checkout"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run release discovery agent
        env:
          # Fine-grained token for Copilot CLI automation (repo contents + pull requests)
          # Configure in repository/environment secrets as COPILOT_GITHUB_TOKEN
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          test -f .github/prompts/find-new-releases.prompt.md
          copilot -p "$(cat .github/prompts/find-new-releases.prompt.md)" \
            --allow-all-tools --allow-all-urls --autopilot --no-ask-user

      - name: Run data validation script
        run: python3 .github/scripts/validate_whiskey_data.py

      - name: Fix broken URLs
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          test -f .github/prompts/fix-broken-urls.prompt.md
          copilot -p "$(cat .github/prompts/fix-broken-urls.prompt.md)" \
            --allow-all-tools --allow-all-urls --autopilot --no-ask-user

      - name: Fix broken TTB URLs
        run: python3 .github/scripts/validate_ttb_urls.py --apply

      - name: Run URL validation script
        run: python3 .github/scripts/validate_urls.py

      - name: Run TTB URL validation script
        run: python3 .github/scripts/validate_ttb_urls.py

      - name: Generate GitHub App token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Commit and push changes
        id: commit_push
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure we are on the PR branch (create it from current HEAD if it doesn't exist yet)
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "automated/find-new-releases" ]; then
            git checkout -b automated/find-new-releases
          fi

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Automated bourbon and rye release update"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            git push origin automated/find-new-releases
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update Pull Request
        if: steps.commit_push.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          EXISTING_PR=$(gh pr list --head automated/find-new-releases --base main --json number --jq '.[0].number' 2>/dev/null)

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --head automated/find-new-releases \
              --base main \
              --title "Bourbon and rye release updates" \
              --body "## Automated Release Discovery

This PR was generated by the release discovery agent workflow.

### What this workflow does
- Searches for newly announced bourbon and rye releases
- Prefers official press releases and official product pages
- Updates \`_data/whiskeyindex.csv\` with complete fields, URLs, and TTB labels when verified
- Extends \`ReleaseYear\` ranges for unchanged recurring releases instead of adding duplicate rows
- Runs repository validation scripts before creating this PR

---
*Automated by \`.github/workflows/find-new-releases.yml\`*" \
              --label "automated" \
              --label "release-updates"

            gh pr merge --auto --squash --head automated/find-new-releases 2>/dev/null || true
          else
            echo "PR #${EXISTING_PR} already exists — new commits pushed to existing branch"
          fi
