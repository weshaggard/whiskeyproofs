# Daily workflow to find new TTB COLA labels and create PRs for downloading them
name: Find New TTB Labels

on:
  push:
    branches: [main]

  # Run daily at 3 PM UTC (7 AM PST / 8 AM PDT)
  schedule:
    - cron: '0 15 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Start date (YYYY-MM-DD) - defaults to 7 days ago'
        required: false
        type: string
      date_to:
        description: 'End date (YYYY-MM-DD) - defaults to today'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  find-new-labels:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    environment: automation
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Switch to PR branch if it already exists
        run: |
          if git fetch origin automated/new-ttb-labels 2>/dev/null; then
            git checkout automated/new-ttb-labels
            echo "Checked out existing PR branch — new changes will be additive"
          else
            echo "Branch does not exist yet — it will be created from the current checkout"
          fi
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          sudo apt-get install -y tesseract-ocr
          pip install requests beautifulsoup4 pytesseract Pillow easyocr
      
      - name: Find new TTB labels
        id: find_labels
        run: |
          # Set date range
          if [ -n "${{ github.event.inputs.date_from }}" ]; then
            DATE_FROM="${{ github.event.inputs.date_from }}"
          else
            DATE_FROM=$(date -d '7 days ago' +%Y-%m-%d)
          fi
          
          if [ -n "${{ github.event.inputs.date_to }}" ]; then
            DATE_TO="${{ github.event.inputs.date_to }}"
          else
            DATE_TO=$(date +%Y-%m-%d)
          fi
          
          echo "date_from=${DATE_FROM}" >> $GITHUB_OUTPUT
          echo "date_to=${DATE_TO}" >> $GITHUB_OUTPUT
          
          # Run the script and save output
          python3 .github/scripts/find_new_ttb_labels.py \
            --from "${DATE_FROM}" \
            --to "${DATE_TO}" \
            --origin "" \
            --output new_labels.json \
            --verbose | tee search_output.txt
          
          # Check if any new labels were found
          NEW_COUNT=$(python3 -c "import json; data=json.load(open('new_labels.json')); print(data.get('count', 0))")
          echo "new_count=${NEW_COUNT}" >> $GITHUB_OUTPUT
          
          # Get total results found in registry (pagination now handles all results)
          TOTAL_RESULTS=$(python3 -c "import json; data=json.load(open('new_labels.json')); print(data.get('total_registry_results', 0))")
          echo "total_results=${TOTAL_RESULTS}" >> $GITHUB_OUTPUT
          
          if [ "$NEW_COUNT" -gt 0 ]; then
            echo "has_new_labels=true" >> $GITHUB_OUTPUT
          else
            echo "has_new_labels=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Download new labels
        if: steps.find_labels.outputs.has_new_labels == 'true'
        id: download_labels
        run: |
          # Extract TTB IDs from JSON
          TTB_IDS=$(python3 -c "import json; data=json.load(open('new_labels.json')); print(' '.join(data['new_ttb_ids']))")
          
          echo "Downloading labels for TTB IDs: ${TTB_IDS}"
          
          # Download each new label and track results
          SUCCESS_COUNT=0
          FAIL_COUNT=0
          FAILED_IDS=""
          
          for TTB_ID in $TTB_IDS; do
            echo "Downloading TTB ID: $TTB_ID"
            if python3 .github/scripts/download_ttb_labels.py --ttbid "$TTB_ID"; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              FAILED_IDS="$FAILED_IDS $TTB_ID"
              echo "  ⚠️ Failed to download TTB ID: $TTB_ID"
            fi
          done
          
          echo ""
          echo "Download summary: $SUCCESS_COUNT succeeded, $FAIL_COUNT failed"
          
          if [ $FAIL_COUNT -gt 0 ]; then
            echo "Failed TTB IDs:$FAILED_IDS"
          fi
          
          # Save download stats to outputs
          echo "success_count=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "fail_count=$FAIL_COUNT" >> $GITHUB_OUTPUT
          
          # Create formatted list of TTB IDs for PR body
          python3 << 'PYEOF' > ttb_list.txt
          import json
          data = json.load(open('new_labels.json'))
          for ttb_id in data['new_ttb_ids']:
              url = f'https://www.ttbonline.gov/colasonline/viewColaDetails.do?action=publicFormDisplay&ttbid={ttb_id}'
              print(f'- [{ttb_id}]({url})')
          PYEOF
          
          # Save to output using heredoc to handle multiline content
          echo 'ttb_list<<EOF' >> $GITHUB_OUTPUT
          cat ttb_list.txt >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
      
      - name: Run OCR on new labels
        if: steps.find_labels.outputs.has_new_labels == 'true'
        run: |
          # Extract TTB IDs from JSON and run OCR on each newly downloaded label
          TTB_IDS=$(python3 -c "import json; data=json.load(open('new_labels.json')); print(' '.join(data['new_ttb_ids']))")
          
          for TTB_ID in $TTB_IDS; do
            if [ -d "labels/$TTB_ID" ]; then
              echo "Running OCR for TTB ID: $TTB_ID"
              python3 .github/scripts/extract_label_text.py --ttbid "$TTB_ID" || echo "  ⚠️ OCR failed for $TTB_ID (non-fatal)"
            fi
          done
      
      - name: Generate GitHub App Token
        id: generate_token
        if: steps.find_labels.outputs.has_new_labels == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
      
      - name: Commit and push changes
        id: commit_push
        if: steps.find_labels.outputs.has_new_labels == 'true'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure we are on the PR branch (create it from current HEAD if it doesn't exist yet)
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "automated/new-ttb-labels" ]; then
            git checkout -b automated/new-ttb-labels
          fi

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Add new TTB labels from ${{ steps.find_labels.outputs.date_from }} to ${{ steps.find_labels.outputs.date_to }}"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            git push origin automated/new-ttb-labels
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update Pull Request
        if: steps.commit_push.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          EXISTING_PR=$(gh pr list --head automated/new-ttb-labels --base main --json number --jq '.[0].number' 2>/dev/null)

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --head automated/new-ttb-labels \
              --base main \
              --title "New TTB Labels: ${{ steps.find_labels.outputs.new_count }} found (${{ steps.find_labels.outputs.date_from }} to ${{ steps.find_labels.outputs.date_to }})" \
              --body "## New TTB COLA Labels Found

This PR was automatically created by the daily TTB label finder workflow.

**Search Date Range:** ${{ steps.find_labels.outputs.date_from }} to ${{ steps.find_labels.outputs.date_to }}
**New Labels Found:** ${{ steps.find_labels.outputs.new_count }}
**Download Results:** ${{ steps.download_labels.outputs.success_count }} succeeded, ${{ steps.download_labels.outputs.fail_count }} failed
**Total Registry Results:** ${{ steps.find_labels.outputs.total_results }}

### Search Criteria
- **Origin Code:** All origin codes (not limited to Kentucky)
- **Product Class/Type:** 100-150 (whiskey)
- **Pagination:** Enabled (automatically retrieves all pages)

### New TTB IDs

The following new TTB IDs were found and downloaded:

${{ steps.download_labels.outputs.ttb_list }}

### Next Steps

1. Review the downloaded label images in the \`labels/\` directory
2. Verify the labels are for whiskey products
3. Consider adding entries to \`_data/whiskeyindex.csv\` if these are new products
4. Merge this PR to add the labels to the repository

---
*Automated by \`.github/workflows/find-new-ttb-labels.yml\`*" \
              --label "automated" \
              --label "ttb-labels"

            gh pr merge --auto --squash --head automated/new-ttb-labels 2>/dev/null || true
          else
            echo "PR #${EXISTING_PR} already exists — new commits pushed to existing branch"
          fi
      
      - name: Upload search results as artifact
        if: steps.find_labels.outputs.has_new_labels == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: new-labels-${{ steps.find_labels.outputs.date_to }}
          path: |
            new_labels.json
            search_output.txt
          retention-days: 30
      
      - name: No new labels found
        if: steps.find_labels.outputs.has_new_labels == 'false'
        run: |
          echo "No new TTB labels found for date range ${{ steps.find_labels.outputs.date_from }} to ${{ steps.find_labels.outputs.date_to }}"
          echo "No PR will be created."
